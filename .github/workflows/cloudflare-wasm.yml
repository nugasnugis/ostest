name: Compile AxelOS to Cloudflare Chunks
on:
  push:
    branches: [ main ]

jobs:
  build-and-split:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download and Extract Container2Wasm
        run: |
          curl -L -o c2w.tar.gz "https://github.com/container2wasm/container2wasm/releases/download/v0.8.4/container2wasm-v0.8.4-linux-amd64.tar.gz"
          tar -xf c2w.tar.gz
          sudo mv c2w /usr/local/bin/
          chmod +x /usr/local/bin/c2w
          rm c2w.tar.gz

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Build and Convert to WebAssembly
        run: |
          # Build your custom Docker layout image
          docker build -t axelos-base -f .devcontainer/Dockerfile .
          
          # Compile container into raw JS/WASM output directory
          c2w --to-js axelos-base ./cloudflare-raw/

      - name: Manual Fail-Safe Chunk Slicing
        run: |
          mkdir -p ./cloudflare-dist/
          
          # Move small interface files directly into the delivery folder
          cp ./cloudflare-raw/*.js ./cloudflare-dist/ 2>/dev/null || true
          cp ./cloudflare-raw/*.html ./cloudflare-dist/ 2>/dev/null || true
          
          # Find the heavy .wasm or binary image file and slice it into safe 15MB pieces
          # This completely avoids Cloudflare's asset size limits automatically
          if [ -f ./cloudflare-raw/*.wasm ]; then
            split -b 15M ./cloudflare-raw/*.wasm ./cloudflare-dist/wasm-chunk.
          else
            # Handles generic binary images if no raw .wasm is outputted
            split -b 15M ./cloudflare-raw/* ./cloudflare-dist/chunk.
          fi

      - name: Deploy Split Assets to Pages Branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: cloudflare-dist
          branch: cloudflare-deploy
